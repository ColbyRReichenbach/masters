<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <!-- Main 3D Ball Gradient -->
    <radialGradient id="ballSurface" cx="35%" cy="35%" r="65%" fx="30%" fy="30%">
      <stop offset="0%" style="stop-color:#ffffff" />
      <stop offset="60%" style="stop-color:#f9fbff" />
      <stop offset="85%" style="stop-color:#e0e7ff" />
      <stop offset="100%" style="stop-color:#cbd5e1" />
    </radialGradient>
    
    <!-- High-Fidelity Dimple Gradient (Inner Crevice Shadow) -->
    <radialGradient id="dimpleInner" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#94a3b8;stop-opacity:0.8" />
      <stop offset="40%" style="stop-color:#cbd5e1;stop-opacity:0.4" />
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0" />
    </radialGradient>
    
    <!-- Subtle Rim Light -->
    <filter id="rimLight" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="1.5" result="blur" />
      <feOffset dx="-1" dy="-1" result="offsetBlur" />
      <feComposite in="offsetBlur" in2="SourceAlpha" operator="arithmetic" k2="-1" k3="1" result="rimShadow" />
    </filter>
  </defs>

  <!-- Outer Ambient Shadow -->
  <circle cx="50" cy="53" r="47" fill="#000" opacity="0.1" filter="blur(2px)" />

  <!-- The Core Ball Body -->
  <circle cx="50" cy="50" r="48" fill="url(#ballSurface)" stroke="#004621" stroke-width="0.5" />
  
  <!-- Symmetrically Placed High-Reality Dimples -->
  <g opacity="0.6">
    <!-- Center Cluster -->
    <circle cx="50" cy="50" r="3.5" fill="url(#dimpleInner)" transform="translate(0.5, 0.5)" />
    
    <!-- Inner Ring -->
    <circle cx="50" cy="35" r="3.5" fill="url(#dimpleInner)" transform="translate(0.5, 0.5)" />
    <circle cx="65" cy="50" r="3.5" fill="url(#dimpleInner)" transform="translate(0.5, 0.5)" />
    <circle cx="50" cy="65" r="3.5" fill="url(#dimpleInner)" transform="translate(0.5, 0.5)" />
    <circle cx="35" cy="50" r="3.5" fill="url(#dimpleInner)" transform="translate(0.5, 0.5)" />
    <circle cx="41" cy="41" r="3.5" fill="url(#dimpleInner)" transform="translate(0.5, 0.5)" />
    <circle cx="59" cy="41" r="3.5" fill="url(#dimpleInner)" transform="translate(0.5, 0.5)" />
    <circle cx="59" cy="59" r="3.5" fill="url(#dimpleInner)" transform="translate(0.5, 0.5)" />
    <circle cx="41" cy="59" r="3.5" fill="url(#dimpleInner)" transform="translate(0.5, 0.5)" />

    <!-- Outer Ring 1 -->
    <circle cx="50" cy="22" r="3.3" fill="url(#dimpleInner)" transform="translate(0.3, 0.3)" />
    <circle cx="70" cy="30" r="3.3" fill="url(#dimpleInner)" transform="translate(0.3, 0.3)" />
    <circle cx="78" cy="50" r="3.3" fill="url(#dimpleInner)" transform="translate(0.3, 0.3)" />
    <circle cx="70" cy="70" r="3.3" fill="url(#dimpleInner)" transform="translate(0.3, 0.3)" />
    <circle cx="50" cy="78" r="3.3" fill="url(#dimpleInner)" transform="translate(0.3, 0.3)" />
    <circle cx="30" cy="70" r="3.3" fill="url(#dimpleInner)" transform="translate(0.3, 0.3)" />
    <circle cx="22" cy="50" r="3.3" fill="url(#dimpleInner)" transform="translate(0.3, 0.3)" />
    <circle cx="30" cy="30" r="3.3" fill="url(#dimpleInner)" transform="translate(0.3, 0.3)" />

    <!-- Extreme Outer Edge (Smaller) -->
    <circle cx="50" cy="11" r="2.5" fill="url(#dimpleInner)" transform="translate(0.2, 0.2)" />
    <circle cx="77" cy="19" r="2.5" fill="url(#dimpleInner)" transform="translate(0.2, 0.2)" />
    <circle cx="89" cy="50" r="2.5" fill="url(#dimpleInner)" transform="translate(0.2, 0.2)" />
    <circle cx="77" cy="81" r="2.5" fill="url(#dimpleInner)" transform="translate(0.2, 0.2)" />
    <circle cx="50" cy="89" r="2.5" fill="url(#dimpleInner)" transform="translate(0.2, 0.2)" />
    <circle cx="23" cy="81" r="2.5" fill="url(#dimpleInner)" transform="translate(0.2, 0.2)" />
    <circle cx="11" cy="50" r="2.5" fill="url(#dimpleInner)" transform="translate(0.2, 0.2)" />
    <circle cx="23" cy="19" r="2.5" fill="url(#dimpleInner)" transform="translate(0.2, 0.2)" />
  </g>

  <!-- Specular Highlight (The 'Sheen') -->
  <ellipse cx="35" cy="35" rx="15" ry="10" fill="white" opacity="0.3" transform="rotate(-45, 35, 35)" />
</svg>
